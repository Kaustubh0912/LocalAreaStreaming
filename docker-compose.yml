services:
  las:
    build:
      context: .
      dockerfile: Dockerfile
    image: las-media-server:latest
    container_name: las-media-server
    restart: unless-stopped
    # Passes TMDB_API_KEY, OPENSUBTITLES_API_KEY, HW_ACCEL, etc.
    env_file:
      - .env
    ports:
      - "${LAS_PORT:-8096}:8096"
    environment:
      PORT: 8096
      NODE_ENV: production
    volumes:
      # Stores config, watch progress, poster cache, subtitle cache, and HLS cache.
      - ./data:/app/server/data

      # Set LAS_MEDIA_PATH in .env, then add /media in the app settings.
      # Example in .env on Windows: LAS_MEDIA_PATH=D:\Movies
      - ${LAS_MEDIA_PATH:-./media}:/media:ro
